[mypy]
python_version = 3.11
no_implicit_optional = true
warn_redundant_casts = true
ignore_missing_imports = true
# warn_unused_ignores fica desligado de propósito: o mypy resolve o genérico
# Request[State] do Starlette de forma sensível ao ambiente (mesma versão de
# pacotes, verificado, mas veredito diferente entre execução local e CI no
# app.add_exception_handler do slowapi) — um # type: ignore necessário num
# ambiente aparece como "não utilizado" no outro. warn_unused_ignores é
# conhecidamente frágil nesse cenário; preferimos manter o ignore justificado
# a perseguir uma paridade de ambiente que não está sob nosso controle.
