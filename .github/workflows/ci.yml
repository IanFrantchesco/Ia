name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Build database (offline, sem segredos)
        run: python database/build_db.py

      - name: Lint (ruff)
        run: ruff check app.py tests/

      - name: Type check (mypy)
        run: mypy app.py

      - name: Auditoria de CVE nas dependências de produção
        run: pip-audit -r requirements.txt

      - name: Run tests + cobertura
        run: pytest -v --cov=app --cov-report=term-missing --cov-fail-under=95
